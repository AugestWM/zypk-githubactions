name: Daily Fetch Numbers

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch number list
        run: |
          echo "Fetching number list..."
          curl -sS "https://textdb.online/XTCZYPK" > numbers.txt

      - name: Fetch and update each number
        run: |
          while IFS= read -r number; do
            [ -z "$number" ] && continue
            echo "Processing: $number"
            content=$(curl -sS "https://textdb.online/XTCZYPK${number}")
            echo "Content: $content"
            echo "$content" > "${number}.txt"
            curl -sS -X POST "https://api.textdb.online/update?key=XTCZYPK${number}&value=${content}" || echo "Update failed: $number"
          done < numbers.txt
